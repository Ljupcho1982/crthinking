<svg width="220" height="56" viewBox="0 0 220 56" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CRThinking logo">
  <defs>
    <linearGradient id="crGrad" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#36e2ff"/>
      <stop offset="0.5" stop-color="#6f7bff"/>
      <stop offset="1" stop-color="#b65cff"/>
    </linearGradient>
    <linearGradient id="crText" x1="64" y1="0" x2="210" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eaf6ff"/>
      <stop offset="1" stop-color="#9fb4ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hexagon neural mark -->
  <g filter="url(#glow)">
    <path d="M28 4 L48 15 L48 41 L28 52 L8 41 L8 15 Z"
          fill="none" stroke="url(#crGrad)" stroke-width="2.4" stroke-linejoin="round"/>
    <!-- Neural nodes + links forming an abstract 'C' + 'R' brain -->
    <circle cx="20" cy="18" r="2.6" fill="url(#crGrad)"/>
    <circle cx="37" cy="20" r="2.6" fill="url(#crGrad)"/>
    <circle cx="16" cy="32" r="2.6" fill="url(#crGrad)"/>
    <circle cx="30" cy="38" r="2.6" fill="url(#crGrad)"/>
    <circle cx="39" cy="34" r="2.6" fill="url(#crGrad)"/>
    <path d="M20 18 L37 20 M20 18 L16 32 M16 32 L30 38 M37 20 L39 34 M30 38 L39 34 M37 20 L30 38"
          stroke="url(#crGrad)" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- Wordmark -->
  <text x="62" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700"
        fill="url(#crText)" letter-spacing="0.5">CR<tspan font-weight="400" fill="#7f8dff">Thinking</tspan></text>
</svg>
